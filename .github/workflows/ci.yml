name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Syntax check (compileall)
        run: python -m compileall fof server scripts .claude/skills
      - name: Run network-free tests
        # The full suite (test_regime/master/factors/sleeves_new/...) fetches live Tushare data
        # via the parquet cache; we only run the subset whose imports/asserts don't touch the
        # network. test_factor_allocation is pure dict→dict; test_selection, test_weights,
        # test_perf, test_factors validate selection/weights/perf math on small frames in-memory.
        run: |
          python -m pytest -q \
            tests/test_factor_allocation.py \
            tests/test_selection.py \
            tests/test_weights.py \
            tests/test_perf.py \
            tests/test_factors.py
